# INLINED workflow (replaces thin-caller to workflows-central/classroom-reusable.yml).
# Equivalent to workflows-central@v3.4.0 with these substitutions baked in:
#   inputs.instructor_org   → vars.INSTRUCTOR_ORG (read at runtime)
#   inputs.max_score_*      → 1 / 1 / 3 (defaults)
#   edge_cases step         → omitted (max_score_edge_cases default 0)
#
# Why inline: reusable-workflow chain has too many fragile moving parts
# (tag pins, visibility matching, cross-org PAT scopes). When dispatch
# fails on release day, isolating which layer broke takes hours. We
# trade edit-once convenience for fewer moving parts at release time.
# See feedback_reusable_workflow_fallback.md and
# project_inline_experiment_042p_071.md for the rationale.
#
# This file is the source of truth; cascades downward via
# merge_from_template.py (classroom.yml is in TAKE_THEIRS_AND_FIX, so
# downstream repos take this file verbatim on each merge).
#
# Prerequisites (set at the org level):
#   vars.INSTRUCTOR_ORG  — GitHub org/user hosting grader images
#   secrets.CR_PAT       — GHCR pull token (required)
#   secrets.GOOGLE_API_KEY (or other AI-tutor provider keys) — at least one required

name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
  - pull_request

permissions:
  checks: read
  actions: write
  contents: read
  issues: write   # follow-up issue tracking

jobs:
  check-env:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    name: Check Environment Variables
    env:
      CR_PAT: ${{ secrets.CR_PAT }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
    steps:
    - name: Check Variables
      id: check-vars
      run: |
        echo "Checking required secrets..."
        if [ -z "${CR_PAT}" ]; then
          echo "Error: Required secret CR_PAT is not set. Set it in Settings > Secrets and variables > Actions." | tee -a $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "Secret CR_PAT is set."
        fi
        if [ -z "${DEFAULT_MODEL}" ]; then
          echo "Warning: DEFAULT_MODEL is not set. The AI tutor will use Gemini or a single available model. Consider setting it in Settings > Secrets and variables > Actions." | tee -a $GITHUB_STEP_SUMMARY
        else
          echo "DEFAULT_MODEL is set."
        fi
        echo "Checking API keys..."
        api_keys=(
          "CLAUDE_API_KEY"
          "GOOGLE_API_KEY"
          "XAI_API_KEY"
          "NVIDIA_NIM_API_KEY"
          "PERPLEXITY_API_KEY"
        )
        has_api_key=false
        for key in "${api_keys[@]}"; do
          if [ -n "${!key}" ]; then
            has_api_key=true
            break
          fi
        done
        echo "Finished checking API keys..."
        if ! $has_api_key; then
          echo "Error: At least one API key must be set (e.g., GOOGLE_API_KEY). Set in Settings > Secrets and variables > Actions." | tee -a $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "At least one API key is set."
        fi

  grade:
    runs-on: ubuntu-latest
    needs: check-env
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set report file names
      id: json
      run: |
        ASSIGNMENT_NUM=$(echo "${{ github.repository }}" \
          | grep -o '[/-][0-9]\{3\}' | head -1 | tr -d '/-')
        echo "ASSIGNMENT_NUM=${ASSIGNMENT_NUM}" >> $GITHUB_ENV
        SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
        echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
        echo "syntax=report_syntax.json" >> $GITHUB_ENV
        echo "style=report_style.json" >> $GITHUB_ENV
        echo "results=report_results.json" >> $GITHUB_ENV
        echo "workflow_student_code_folder=${{ github.workspace }}" >> $GITHUB_ENV
        echo "c_mnt=/app/workspace" >> $GITHUB_ENV
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          echo "image_url=${{ github.event.client_payload.image_url }}" >> $GITHUB_ENV
          echo "ai_model=${{ github.event.client_payload.ai_model }}" >> $GITHUB_ENV
        else
          INSTRUCTOR_ORG="${{ vars.INSTRUCTOR_ORG }}"
          echo "image_url=ghcr.io/${INSTRUCTOR_ORG}/python-pytest-${ASSIGNMENT_NUM}:latest" >> $GITHUB_ENV
          echo "ai_model=${{ secrets.DEFAULT_MODEL }}" >> $GITHUB_ENV
        fi

    - name: Log image URL
      run: |
        echo "Using IMAGE_URL: ${{ env.image_url }}"

    # container json report folder has to be a location under
    #   container mounting point
    - name: Set folders within the container
      run: |
        echo "c_code=${{ env.c_mnt }}" >> $GITHUB_ENV
        echo "c_test=/tests" >> $GITHUB_ENV

    - name: Make output folder for the container
      run: |
        OUTPUT_NAME=output
        OUTPUT_FOLDER="${{ runner.temp }}/${OUTPUT_NAME}"
        mkdir -p "${OUTPUT_FOLDER}"
        if [ -d "${OUTPUT_FOLDER}" ]; then
          echo "Folder ${OUTPUT_FOLDER} exists."
        else
          echo "Error: Folder ${OUTPUT_FOLDER} does not exist."
          exit 1
        fi
        if [ -w "${OUTPUT_FOLDER}" ]; then
          echo "Folder ${OUTPUT_FOLDER} is writable."
        else
          echo "Error: Folder ${OUTPUT_FOLDER} is not writable."
          exit 1
        fi
        echo "WORKSPACE_OUTPUT=${OUTPUT_FOLDER}" >> $GITHUB_ENV
        echo "CONTAINER_OUTPUT=/${OUTPUT_NAME}" >> $GITHUB_ENV

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ vars.INSTRUCTOR_ORG }}
        password: ${{ secrets.CR_PAT }}

    - name: Pull Docker Image
      run: docker pull "${{ env.image_url }}"

    - name: check syntax
      id: check-syntax
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: check syntax
        setup-command: "docker run --rm --user 1001:1001 --network none --volume '${{ github.workspace }}:${{ env.c_mnt }}:ro' --volume '${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:rw' '${{ env.image_url }}' python3 -m pip list"
        command:       "docker run --rm --user 1001:1001 --network none --read-only --tmpfs /tmp:rw,size=64m --memory=512m --cpus=2.0 --pids-limit=128 --volume '${{ github.workspace }}:${{ env.c_mnt }}:ro' --volume '${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:rw' --env 'STUDENT_CODE_FOLDER=${{ env.c_code }}' '${{ env.image_url }}' python3 -m pytest --json-report --json-report-indent=4 '--json-report-file=${{ env.CONTAINER_OUTPUT }}/${{ env.syntax }}' '${{ env.c_test }}/test_syntax.py'"
        timeout: 2
        max-score: 1

    - name: check style
      id: check-style
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: check style
        setup-command: "docker run --rm --user 1001:1001 --network none --volume '${{ github.workspace }}:${{ env.c_mnt }}:ro' --volume '${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:rw' '${{ env.image_url }}' python3 -m pip list"
        command:       "docker run --rm --user 1001:1001 --network none --read-only --tmpfs /tmp:rw,size=64m --memory=512m --cpus=2.0 --pids-limit=128 --volume '${{ github.workspace }}:${{ env.c_mnt }}:ro' --volume '${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:rw' --env 'STUDENT_CODE_FOLDER=${{ env.c_code }}' --env 'GITHUB_WORKSPACE=${{ env.c_mnt }}' '${{ env.image_url }}' python3 -m pytest --json-report --json-report-indent=4 '--json-report-file=${{ env.CONTAINER_OUTPUT }}/${{ env.style }}' '${{ env.c_test }}/test_style.py'"
        timeout: 2
        max-score: 1

    - name: test results
      id: test-results
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test results
        setup-command: "docker run --rm --user 1001:1001 --network none --volume '${{ github.workspace }}:${{ env.c_mnt }}:ro' --volume '${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:rw' '${{ env.image_url }}' python3 -m pip list"
        command:       "docker run --rm --user 1001:1001 --network none --read-only --tmpfs /tmp:rw,size=64m --memory=512m --cpus=2.0 --pids-limit=128 --volume '${{ github.workspace }}:${{ env.c_mnt }}:ro' --volume '${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:rw' --env 'STUDENT_CODE_FOLDER=${{ env.c_code }}' --env 'GITHUB_WORKSPACE=${{ env.c_mnt }}' '${{ env.image_url }}' python3 -m pytest -n auto --json-report --json-report-indent=4 '--json-report-file=${{ env.CONTAINER_OUTPUT }}/${{ env.results }}' '${{ env.c_test }}/test_results.py'"
        timeout: 5
        max-score: 3

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHECK-SYNTAX_RESULTS: "${{steps.check-syntax.outputs.result}}"
        CHECK-STYLE_RESULTS: "${{steps.check-style.outputs.result}}"
        TEST-RESULTS_RESULTS: "${{steps.test-results.outputs.result}}"
      with:
        runners: check-syntax,check-style,test-results

    - name: AI Tutor
      id: ai-tutor
      if: always()
      run: |
        docker run --rm --user 1001:1001 \
          --read-only --tmpfs /tmp:rw,size=64m \
          --memory=512m --cpus=2.0 --pids-limit=128 \
          --volume "${{ github.workspace }}:${{ env.c_mnt }}:ro" \
          --volume "${{ env.WORKSPACE_OUTPUT }}:${{ env.CONTAINER_OUTPUT }}:ro" \
          --env "INPUT_REPORT-FILES=${{ env.CONTAINER_OUTPUT }}/${{ env.results }},${{ env.CONTAINER_OUTPUT }}/${{ env.syntax }},${{ env.CONTAINER_OUTPUT }}/${{ env.style }}" \
          --env "INPUT_STUDENT-FILES=${{ env.c_code }}/exercise.py" \
          --env "INPUT_README-PATH=${{ env.c_code }}/README.md" \
          --env "INPUT_CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" \
          --env "INPUT_GEMINI-API-KEY=${{ secrets.GOOGLE_API_KEY }}" \
          --env "INPUT_GROK-API-KEY=${{ secrets.XAI_API_KEY }}" \
          --env "INPUT_NVIDIA-API-KEY=${{ secrets.NVIDIA_NIM_API_KEY }}" \
          --env "INPUT_PERPLEXITY-API-KEY=${{ secrets.PERPLEXITY_API_KEY }}" \
          --env "INPUT_GITHUB_REPOSITORY=${{ github.repository }}" \
          --env "INPUT_MODEL=${{ env.ai_model }}" \
          --env "INPUT_EXPLANATION-IN=Korean" \
          "${{ env.image_url }}" \
          python3 ai_tutor/entrypoint.py > "${{ env.WORKSPACE_OUTPUT }}/feedback.md"
      timeout-minutes: 10

    - name: forward feedback to summary
      if: always()
      run: |
        cat "${{ env.WORKSPACE_OUTPUT }}/feedback.md" >> $GITHUB_STEP_SUMMARY

    - name: Follow-up Issues
      if: always()
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        REPORT_DIR: ${{ env.WORKSPACE_OUTPUT }}
      run: |
        python3 - <<'PYEOF'
        import json, glob, os, subprocess, sys

        REPORT_DIR = os.environ["REPORT_DIR"]
        LABEL = "follow-up"
        SERVER = os.environ["GITHUB_SERVER_URL"]
        REPO = os.environ["GITHUB_REPOSITORY"]
        RUN_ID = os.environ["GITHUB_RUN_ID"]
        RUN_URL = f"{SERVER}/{REPO}/actions/runs/{RUN_ID}"
        SHA7 = os.environ.get("GITHUB_SHA", "")[:7]

        # 1. Ensure label exists (idempotent)
        subprocess.run(
            ["gh", "label", "create", LABEL,
             "--description", "Test needs attention",
             "--color", "1d76db", "--force"],
            capture_output=True,
        )

        # 2. Parse report_*.json files
        reports = sorted(glob.glob(
            os.path.join(REPORT_DIR, "report_*.json")))
        if not reports:
            print("No report files found; skipping.")
            sys.exit(0)

        # Aggregate outcomes per base test name
        # (strip parametrize brackets: test_func[param] -> test_func)
        outcomes = {}  # {name: set(outcomes)}
        for path in reports:
            try:
                data = json.load(open(path))
            except (json.JSONDecodeError, FileNotFoundError):
                continue
            for t in data.get("tests", []):
                nodeid = t.get("nodeid", "")
                outcome = t.get("outcome", "")
                func = nodeid.split("::")[-1].split("[")[0]
                if func:
                    outcomes.setdefault(func, set()).add(outcome)

        failed = {n for n, o in outcomes.items()
                  if not o <= {"passed", "skipped"}}
        passed = {n for n, o in outcomes.items()
                  if o <= {"passed", "skipped"}}

        print(f"Failed: {sorted(failed)}")
        print(f"Passed: {sorted(passed)}")

        # 3. Fetch existing follow-up issues (all states)
        r = subprocess.run(
            ["gh", "issue", "list", "--label", LABEL,
             "--state", "all", "--json", "number,title,state",
             "--limit", "100"],
            capture_output=True, text=True,
        )
        if r.returncode != 0:
            print(f"Cannot list issues: {r.stderr}")
            sys.exit(0)
        existing = {
            i["title"]: {"number": i["number"], "state": i["state"]}
            for i in json.loads(r.stdout)
        }

        # 4. Failed tests -> create issue or add bot comment
        for name in sorted(failed):
            if name in existing:
                iss = existing[name]
                if iss["state"] == "CLOSED":
                    subprocess.run(
                        ["gh", "issue", "reopen", str(iss["number"])],
                        capture_output=True)
                subprocess.run(
                    ["gh", "issue", "comment", str(iss["number"]),
                     "--body",
                     f"<!-- bot -->\nStill failing at [`{SHA7}`]({RUN_URL})."],
                    capture_output=True)
            else:
                subprocess.run(
                    ["gh", "issue", "create", "--title", name,
                     "--label", LABEL, "--body",
                     f"<!-- bot -->\n"
                     f"First failure at [`{SHA7}`]({RUN_URL}).\n\n"
                     f"Tutor feedback is in the Actions tab.\n"
                     f"자동 튜터 피드백은 Actions 탭에 있습니다."],
                    capture_output=True)

        # 5. Passing tests -> close their open issues
        for name in sorted(passed):
            if name in existing and existing[name]["state"] == "OPEN":
                num = existing[name]["number"]
                subprocess.run(
                    ["gh", "issue", "comment", str(num), "--body",
                     f"<!-- bot -->\n"
                     f"Passing at [`{SHA7}`]({RUN_URL}). "
                     f"Great work! 잘 했습니다!"],
                    capture_output=True)
                subprocess.run(
                    ["gh", "issue", "close", str(num),
                     "--reason", "completed"],
                    capture_output=True)

        print("Follow-up issue tracking complete.")
        PYEOF

    - name: upload artifacts
      id: artifacts
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: artifacts-${{ env.SHORT_SHA }}
        path: |
          ${{ env.WORKSPACE_OUTPUT }}/*.png
          ${{ env.WORKSPACE_OUTPUT }}/*.json
          ${{ env.WORKSPACE_OUTPUT }}/feedback.md
        retention-days: 180
        overwrite: true
